<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background: warm graphite rounded square -->
  <rect width="100" height="100" rx="20" fill="#1c1b19"/>
  <!-- Outer hex: coral accent -->
  <polygon points="50,18 80,36 80,64 50,82 20,64 20,36" fill="none" stroke="#e08060" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner hex: lighter -->
  <polygon points="50,30 72,43 72,57 50,70 28,57 28,43" fill="none" stroke="#e08060" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="#e08060"/>
</svg>
